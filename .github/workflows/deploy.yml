name: Deploy Todo App

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ── 1. Deploy AWS Infrastructure with CDK ───────────────────────────────────
  deploy-infra:
    name: CDK Deploy
    runs-on: ubuntu-latest
    outputs:
      s3_bucket: ${{ steps.outputs.outputs.s3_bucket }}
      distribution_id: ${{ steps.outputs.outputs.distribution_id }}
      cloudfront_url: ${{ steps.outputs.outputs.cloudfront_url }}
      user_pool_id: ${{ steps.outputs.outputs.user_pool_id }}
      user_pool_client_id: ${{ steps.outputs.outputs.user_pool_client_id }}
      api_endpoint: ${{ steps.outputs.outputs.api_endpoint }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infra

      - name: CDK Deploy
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
        working-directory: infra

      - name: Extract CDK outputs
        id: outputs
        working-directory: infra
        run: |
          S3=$(jq -r '.TodoStack.S3BucketName' cdk-outputs.json)
          DIST=$(jq -r '.TodoStack.CloudFrontDistributionId' cdk-outputs.json)
          URL=$(jq -r '.TodoStack.CloudFrontURL' cdk-outputs.json)
          UP=$(jq -r '.TodoStack.UserPoolId' cdk-outputs.json)
          UPC=$(jq -r '.TodoStack.UserPoolClientId' cdk-outputs.json)
          API=$(jq -r '.TodoStack.ApiEndpoint' cdk-outputs.json)
          echo "s3_bucket=$S3" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST" >> $GITHUB_OUTPUT
          echo "cloudfront_url=$URL" >> $GITHUB_OUTPUT
          echo "user_pool_id=$UP" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$UPC" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API" >> $GITHUB_OUTPUT

  # ── 2. Build and Deploy React Frontend ──────────────────────────────────────
  deploy-frontend:
    name: Frontend Deploy
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        env:
          VITE_USER_POOL_ID: ${{ needs.deploy-infra.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ needs.deploy-infra.outputs.user_pool_client_id }}
          # CloudFront routes /api/* → API GW so we use a relative path
          VITE_API_BASE: /api
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ needs.deploy-infra.outputs.s3_bucket }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html must not be cached by CDN too aggressively
          aws s3 cp dist/index.html s3://${{ needs.deploy-infra.outputs.s3_bucket }}/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infra.outputs.distribution_id }} \
            --paths "/*"

      - name: Print live URL
        run: echo "✅ Live at ${{ needs.deploy-infra.outputs.cloudfront_url }}"
