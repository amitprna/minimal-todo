name: Deploy Todo App (Backend Only)

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ── Deploy AWS Backend (Lambda, DynamoDB, Cognito) via CDK ──────────────────
  deploy-infra:
    name: CDK Deploy (Backend)
    runs-on: ubuntu-latest
    outputs:
      user_pool_id: ${{ steps.outputs.outputs.user_pool_id }}
      user_pool_client_id: ${{ steps.outputs.outputs.user_pool_client_id }}
      api_endpoint: ${{ steps.outputs.outputs.api_endpoint }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infra

      - name: CDK Deploy
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
        working-directory: infra

      - name: Extract CDK outputs
        id: outputs
        working-directory: infra
        run: |
          UP=$(jq -r '.TodoStack.UserPoolId' cdk-outputs.json)
          UPC=$(jq -r '.TodoStack.UserPoolClientId' cdk-outputs.json)
          API=$(jq -r '.TodoStack.ApiEndpoint' cdk-outputs.json)
          echo "user_pool_id=$UP" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$UPC" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API" >> $GITHUB_OUTPUT
          echo "✅ Backend deployed"
          echo "   User Pool: $UP"
          echo "   API:       $API"

  # NOTE: Frontend is deployed automatically by Vercel on every push to main.
  # Configure environment variables in your Vercel project dashboard:
  #   VITE_USER_POOL_ID       → from CDK output above
  #   VITE_USER_POOL_CLIENT_ID → from CDK output above
  #   VITE_API_BASE           → https://<api-id>.execute-api.us-east-1.amazonaws.com
